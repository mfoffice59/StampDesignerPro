name: Build StampDesigner Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore StampDesigner.csproj

      - name: Publish single EXE
        run: dotnet publish StampDesigner.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item "bin\Release\net8.0-windows\win-x64\publish\StampDesigner.exe" "release\StampDesigner.exe"
          Copy-Item "README_RELEASE.txt" "release\README.txt"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: StampDesigner-Windows-Portable
          path: release
